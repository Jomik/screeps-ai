name: Continuous integration

on:
  pull_request:
    branches:
      - 'main'
  workflow_call:

jobs:
  workspaces:
    uses: ./.github/workflows/workspaces.yml
  build:
    runs-on: ubuntu-latest
    needs: workspaces
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(needs.workspaces.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install
      - name: 'typescript compile'
        run: yarn workspace ${{ matrix.workspace }} run typecheck
  unit-test:
    runs-on: ubuntu-latest
    needs:
      - workspaces
      - build
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(needs.workspaces.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install
      - name: 'run test'
        run: yarn workspace ${{ matrix.workspace }} run test --reporters="github-actions"
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install
      - name: 'run lint'
        run: yarn lint --output-file lint_report.json --format json
        continue-on-error: true
      - name: 'annotate'
        uses: ataylorme/eslint-annotate-action@v3
        with:
          report-json: 'lint_report.json'
