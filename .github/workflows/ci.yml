name: Continuous integration

on:
  pull_request:
    branches:
      - 'main'
  workflow_call:

jobs:
  workspaces:
    uses: ./.github/workflows/workspaces.yml
  check:
    runs-on: ubuntu-latest
    needs: workspaces
    permissions:
      contents: read
      checks: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(needs.workspaces.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install
      - name: 'lint and typecheck'
        run: yarn workspace ${{ matrix.workspace }} run check --format github
  unit-test:
    runs-on: ubuntu-latest
    needs:
      - workspaces
      - check
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(needs.workspaces.outputs.workspaces) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install
      - name: 'run test'
        run: yarn workspace ${{ matrix.workspace }} run test --reporters="github-actions"
